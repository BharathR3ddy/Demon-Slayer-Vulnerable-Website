services:
  db:
    image: 'postgres:17-alpine'
    restart: always
    healthcheck:
      interval: 10s
      retries: 10
      test: ['CMD-SHELL', 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}']
      timeout: 45s
    environment:
      POSTGRES_DB: bc
      POSTGRES_USER: bc
      POSTGRES_PASSWORD: bc
    ports:
      - '5432:5432'
    volumes:
      - './infrastructure/pg.sql:/docker-entrypoint-initdb.d/pg.sql'
      - '.data/nodejs:/var/lib/postgresql/data/'

  nodejs:
    image: 'brightsec/brokencrystals'
    restart: always
    healthcheck:
      interval: 5s
      retries: 10
      test:
        ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3000/api/config']
      timeout: 30s
    environment:
      NODE_ENV: production
      CHAT_API_URL: http://ollama:11434/v1/chat/completions
      CHAT_API_MODEL: smollm:135m
      CHAT_API_TOKEN: ''
      CHAT_API_MAX_TOKENS: 200
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: 3.5
    logging:
      options:
        max-file: '5'
        max-size: '10m'
    depends_on:
      - db
      - ollama

  watchtower:
    image: 'containrrr/watchtower'
    healthcheck:
      test: ['CMD', '/watchtower', '--health-check']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: always
    logging:
      options:
        max-file: '5'
        max-size: '10m'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
    command: --interval 300 --debug

  ollama:
    image: 'brightsec/brokencrystals-ollama:smollm135m'
    restart: always
    healthcheck:
      interval: 30s
      retries: 5
      test: ['CMD', 'ollama', 'list']
      timeout: 10s
      start_period: 60s
    ports:
      - '11434:11434'
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: 2.0
    logging:
      options:
        max-file: '5'
        max-size: '10m'

volumes:
  letsencrypt:
